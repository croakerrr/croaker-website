<script>
// Homepage posts functionality
async function loadHomepagePosts() {
    try {
        const response = await fetch('/api/get-posts');
        const posts = await response.json();
        
        if (!posts || posts.length === 0) return;
        
        // Find pinned post (most recent pinned post)
        const pinnedPost = posts.find(post => post.pinned);
        
        // Find most recent post (that's not pinned)
        const recentPost = posts.find(post => !post.pinned);
        
        // Show pinned post section if there's a pinned post
        if (pinnedPost) {
            document.getElementById('pinned-post-section').style.display = 'block';
            renderHomepagePost(pinnedPost, 'pinned-post-container', 'pinned');
        }
        
        // Show recent post section if there's a recent post
        if (recentPost) {
            document.getElementById('recent-post-section').style.display = 'block';
            renderHomepagePost(recentPost, 'recent-post-container', 'recent');
        }
        
    } catch (error) {
        console.error('Error loading homepage posts:', error);
    }
}

function renderHomepagePost(post, containerId, postType) {
    const container = document.getElementById(containerId);
    
    // Define badge text and class for each post type
    const badgeInfo = {
        pinned: { text: 'PINNED', class: 'pinned' },
        recent: { text: 'NEW POST', class: 'recent' }
    };
    
    // Add the sticky note color class to the container
    container.className = `post-container ${badgeInfo[postType].class}`;
    
    const imageHTML = post.image ? 
        `<div class="homepage-post-image"><img src="${post.image}" alt="${post.title}"></div>` : '';
    
    // Filter tags for homepage display - only show main category tags, not custom ones
    const filteredTags = post.tags ? post.tags.filter(tag => {
        const normalizedTag = tag.toLowerCase();
        const allowedTags = [
            // Languages
            'javascript', 'python', 'java', 'css', 'html', 'react', 'node',
            // Topics
            'university', 'coursework', 'learning', 'project', 'portfolio', 'algorithms', 'database', 'api'
        ];
        return allowedTags.includes(normalizedTag);
    }) : [];
    
    const tagsHTML = filteredTags.length > 0 ? 
        `<div class="homepage-post-tags">${filteredTags.slice(0, 3).map(tag => 
            `<span class="homepage-post-tag">${tag}</span>`
        ).join('')}</div>` : '';
    
    container.innerHTML = `
        <div class="post-badge ${badgeInfo[postType].class}">${badgeInfo[postType].text}</div>
        <div class="homepage-post-title">${post.title}</div>
        <div class="homepage-post-meta">${post.date}</div>
        <div class="homepage-post-excerpt">${post.excerpt}</div>
        ${imageHTML}
        ${tagsHTML}
    `;
    
    // Add click handler to open modal
    container.onclick = () => openHomepagePostModal(post);
}

function openHomepagePostModal(post) {
    const modal = document.getElementById('homepage-post-modal');
    
    document.getElementById('homepage-modal-date').textContent = post.date;
    document.getElementById('homepage-modal-title').textContent = post.title;
    document.getElementById('homepage-modal-author').textContent = `by ${post.author}`;
    
    // Handle content with optional image
    let contentHTML = post.content.replace(/\\n/g, '</p><p>');
    contentHTML = '<p>' + contentHTML + '</p>';
    
    if (post.image) {
        contentHTML = '<div class="blog-post-image"><img src="' + post.image + '" alt="' + post.title + '"></div>' + contentHTML;
    }
    
    document.getElementById('homepage-modal-content').innerHTML = contentHTML;
    
    // Handle tags
    if (post.tags && post.tags.length > 0) {
        document.getElementById('homepage-modal-tags').innerHTML = post.tags.map(tag => 
            `<span class="modal-tag">${tag}</span>`
        ).join('');
    } else {
        document.getElementById('homepage-modal-tags').innerHTML = '';
    }
    
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeHomepageModal() {
    const modal = document.getElementById('homepage-post-modal');
    modal.classList.remove('active');
    document.body.style.overflow = 'auto';
}

// Load posts when page loads
document.addEventListener('DOMContentLoaded', function() {
    loadHomepagePosts();
});
</script>
