<script>
// Homepage posts functionality
async function loadHomepagePosts() {
    try {
        const [postsResponse, projectsResponse] = await Promise.all([
            fetch('/api/get-posts'),
            fetch('/api/get-projects')
        ]);
        
        const posts = await postsResponse.json();
        const projects = await projectsResponse.json();
        
        // Handle blog posts
        if (posts && posts.length > 0) {
            // Find pinned post (most recent pinned post)
            const pinnedPost = posts.find(post => post.pinned);
            
            // Find most recent post (that's not pinned) by sorting by date
            const nonPinnedPosts = posts.filter(post => !post.pinned);
            let recentPost = null;
            
            if (nonPinnedPosts.length > 0) {
                // Sort by date and take the most recent
                recentPost = nonPinnedPosts.reduce((newest, current) => {
                    const parseDate = (dateString) => {
                        if (!dateString) return new Date(0);
                        const [day, month, year] = dateString.split('/');
                        return new Date(year, month - 1, day);
                    };
                    
                    const newestDate = parseDate(newest.date);
                    const currentDate = parseDate(current.date);
                    return currentDate > newestDate ? current : newest;
                });
            }
            
            // Show pinned post section if there's a pinned post
            if (pinnedPost) {
                document.getElementById('pinned-post-section').style.display = 'block';
                renderHomepagePost(pinnedPost, 'pinned-post-container', 'pinned');
            }
            
            // Show recent post section if there's a recent post
            if (recentPost) {
                document.getElementById('recent-post-section').style.display = 'block';
                renderHomepagePost(recentPost, 'recent-post-container', 'recent');
            }
        }
        
        // Handle projects
        if (projects && projects.length > 0) {
            // Find featured project (most recent featured project)
            const featuredProject = projects.find(project => project.featured);
            
            // Find most recent project (that's not featured) by sorting by creation order (newest first)
            const nonFeaturedProjects = projects.filter(project => !project.featured);
            let recentProject = null;
            
            if (nonFeaturedProjects.length > 0) {
                // Take the first (most recent) non-featured project
                recentProject = nonFeaturedProjects[0];
            }
            
            // Show featured project section if there's a featured project
            if (featuredProject) {
                document.getElementById('featured-project-section').style.display = 'block';
                renderHomepageProject(featuredProject, 'featured-project-container', 'featured-project');
            }
            
            // Show recent project section if there's a recent project
            if (recentProject) {
                document.getElementById('recent-project-section').style.display = 'block';
                renderHomepageProject(recentProject, 'recent-project-container', 'recent-project');
            }
        }
        
    } catch (error) {
        console.error('Error loading homepage content:', error);
    }
}

function renderHomepagePost(post, containerId, postType) {
    const container = document.getElementById(containerId);
    
    // Define badge text and class for each post type
    const badgeInfo = {
        pinned: { text: 'PINNED BLOG', class: 'pinned' },
        recent: { text: 'NEW BLOG', class: 'recent' },
        'featured-project': { text: 'PINNED PROJECT', class: 'featured-project' },
        'recent-project': { text: 'NEW PROJECT', class: 'recent-project' }
    };
    
    // Add the sticky note color class to the container
    container.className = `post-container ${badgeInfo[postType].class}`;
    
    const imageHTML = post.image ? 
        `<div class="homepage-post-image"><img src="${post.image}" alt="${post.title}" onclick="openImagePopup('${post.image}', '${post.title}', event)"></div>` : '';
    
    const tagsHTML = '';
    
    container.innerHTML = `
        <div class="post-badge ${badgeInfo[postType].class}">${badgeInfo[postType].text}</div>
        <div class="homepage-post-title">${post.title}</div>
        <div class="homepage-post-meta">${post.date}</div>
        <div class="homepage-post-excerpt">${post.excerpt}</div>
        ${imageHTML}
        ${tagsHTML}
    `;
    
    // Remove any existing click handlers to prevent conflicts
    container.onclick = null;
    container.removeEventListener('click', container._clickHandler);
    
    // Add click handler to open modal with proper event handling
    container._clickHandler = (event) => {
        // Prevent other handlers and default navigation from firing
        event.stopPropagation();
        event.preventDefault();
        // If clicking on an image, allow image handler to run (it already stops propagation)
        if (event.target.tagName === 'IMG') {
            return;
        }
        openHomepagePostModal(post);
    };
    
    // Also ensure any internal anchors do not trigger navigation
    const anchors = container.querySelectorAll('a');
    anchors.forEach(a => {
        a.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
        });
    });
    
    container.addEventListener('click', container._clickHandler);
}

function renderHomepageProject(project, containerId, projectType) {
    const container = document.getElementById(containerId);
    
    // Define badge text and class for each post type
    const badgeInfo = {
        pinned: { text: 'PINNED BLOG', class: 'pinned' },
        recent: { text: 'NEW BLOG', class: 'recent' },
        'featured-project': { text: 'PINNED PROJECT', class: 'featured-project' },
        'recent-project': { text: 'NEW PROJECT', class: 'recent-project' }
    };
    
    // Add the sticky note color class to the container
    container.className = `post-container ${badgeInfo[projectType].class}`;
    
    const imageHTML = project.image ? 
        `<div class="homepage-post-image"><img src="${project.image}" alt="${project.name}" onclick="openImagePopup('${project.image}', '${project.name || project.title || 'Project'}', event)"></div>` : '';
    
    container.innerHTML = `
        <div class="post-badge ${badgeInfo[projectType].class}">${badgeInfo[projectType].text}</div>
        <div class="homepage-post-title">${project.name || project.title || 'Untitled Project'}</div>
        <div class="homepage-post-meta">${project.status || 'Complete'}</div>
        <div class="homepage-post-excerpt">${project.description || ''}</div>
        ${imageHTML}
    `;
    
    // Remove any existing click handlers to prevent conflicts
    container.onclick = null;
    container.removeEventListener('click', container._clickHandler);
    
    // Add click handler to open modal with proper event handling
    container._clickHandler = (event) => {
        // Prevent other handlers and default navigation from firing
        event.stopPropagation();
        event.preventDefault();
        // If clicking on an image, allow image handler to run (it already stops propagation)
        if (event.target.tagName === 'IMG') {
            return;
        }
        openHomepageProjectModal(project);
    };
    
    // Also ensure any internal anchors do not trigger navigation
    const anchors = container.querySelectorAll('a');
    anchors.forEach(a => {
        a.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
        });
    });
    
    container.addEventListener('click', container._clickHandler);
}

function openHomepagePostModal(post) {
    const modal = document.getElementById('homepage-post-modal');
    
    document.getElementById('homepage-modal-date').textContent = post.date;
    document.getElementById('homepage-modal-title').textContent = post.title;
    document.getElementById('homepage-modal-author').textContent = `by ${post.author}`;
    
    // For ellipsis to work, we need plain text content, not HTML elements
    // Convert content to plain text by removing HTML and replacing \\n with spaces
    let plainTextContent = post.content.replace(/\\n/g, ' ');
    
    // Use textContent instead of innerHTML for line clamping to work
    document.getElementById('homepage-modal-content').textContent = plainTextContent;
    
    // Remove tags from homepage modals
    document.getElementById('homepage-modal-tags').innerHTML = '';
    
    // Set up view full post button
    const viewFullBtn = document.getElementById('view-full-post-btn');
    viewFullBtn.onclick = () => {
        closeHomepageModal();
        viewFullPost(post.id);
    };
    
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeHomepageModal() {
    const modal = document.getElementById('homepage-post-modal');
    modal.classList.remove('active');
    document.body.style.overflow = 'auto';
}

function openHomepageProjectModal(project) {
    const modal = document.getElementById('homepage-project-modal');
    
    document.getElementById('homepage-project-modal-status').textContent = project.status || 'Complete';
    document.getElementById('homepage-project-modal-title').textContent = project.name || project.title || 'Untitled Project';
    
    // Handle technologies as tags
    let techHTML = '';
    if (project.technologies && project.technologies.length > 0) {
        techHTML = project.technologies.map(tech => 
            `<span class="blog-tag">${tech.trim()}</span>`
        ).join('');
    }
    document.getElementById('homepage-project-modal-tech').innerHTML = techHTML;
    
    // For ellipsis to work, we need plain text content, not HTML elements
    // Convert content to plain text by removing HTML and replacing \\n with spaces
    let plainTextContent = (project.content || project.description || '').replace(/\\n/g, ' ');
    
    // Use textContent instead of innerHTML for line clamping to work
    document.getElementById('homepage-project-modal-content').textContent = plainTextContent;
    
    // Handle project links
    let linksHTML = '';
    if (project.githubUrl || project.liveUrl || project.blogUrl) {
        linksHTML = '<div class="project-links" style="margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border);">';
        if (project.githubUrl) {
            linksHTML += `<a href="${project.githubUrl}" target="_blank" class="project-link" style="margin-right: 1rem;">GitHub Repository</a>`;
        }
        if (project.liveUrl) {
            linksHTML += `<a href="${project.liveUrl}" target="_blank" class="project-link" style="margin-right: 1rem;">Live Demo</a>`;
        }
        if (project.blogUrl) {
            linksHTML += `<a href="${project.blogUrl}" target="_blank" class="project-link">Related Blog Post</a>`;
        }
        linksHTML += '</div>';
    }
    document.getElementById('homepage-project-modal-links').innerHTML = linksHTML;
    
    // Set up view full project button
    const viewFullBtn = document.getElementById('view-full-project-btn');
    viewFullBtn.onclick = () => {
        closeHomepageProjectModal();
        viewFullProject(project.id);
    };
    
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeHomepageProjectModal() {
    const modal = document.getElementById('homepage-project-modal');
    modal.classList.remove('active');
    document.body.style.overflow = 'auto';
}

// Load posts when page loads
document.addEventListener('DOMContentLoaded', function() {
    loadHomepagePosts();
});

// Navigation functions for view full buttons
function viewFullPost(postId) {
    const url = 'pages/blog.html#' + postId;
    if (window.pageTransition) {
        window.pageTransition.navigateToPage(url);
    } else {
        window.location.href = url;
    }
}

function viewFullProject(projectId) {
    const url = 'pages/projects.html#' + projectId;
    if (window.pageTransition) {
        window.pageTransition.navigateToPage(url);
    } else {
        window.location.href = url;
    }
}

function openImagePopup(imageSrc, imageTitle, event) {
    event.stopPropagation(); // Prevent opening the post/project modal
    const modal = document.getElementById('image-popup-modal');
    const img = document.getElementById('image-popup-img');
    const title = document.getElementById('image-popup-title');
    
    img.src = imageSrc;
    img.alt = imageTitle;
    title.textContent = imageTitle;
    
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeImagePopup() {
    const modal = document.getElementById('image-popup-modal');
    modal.classList.remove('active');
    document.body.style.overflow = 'auto';
}
</script>
